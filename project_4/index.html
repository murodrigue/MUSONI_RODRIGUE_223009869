<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter APP</title>
    <style>
    
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f4f4f4;
        }
        .converter-card {
            background-color: #cccccc;
            padding: 30px;
            border-radius: 8px;
            width: 350px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        label {
            font-size: 14px;
            width: 40%;
            color: #555;
        }
        input, select {
            width: 55%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3399ff;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2680d9;
        }
        .result-area {
            margin-top: 20px;
        }
        #result-display {
            background-color: black;
            color: white;
            padding: 15px;
            min-height: 50px;
            border-radius: 4px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="converter-card">
    <h2>Currency Converter APP</h2>

    <div class="input-group">
        <label>Enter Amount IN FRW</label>
        <input type="number" id="amount" placeholder="0">
    </div>

    <div class="input-group">
    <label>Select Currency</label>
    <select id="currency">
        <option value="USD">USD - US Dollar</option>
        <option value="EUR">EUR - Euro</option>
        <option value="GBP">GBP - British Pound</option>
        <option value="JPY">JPY - Japanese Yen</option>
        <option value="CAD">CAD - Canadian Dollar</option>
        <option value="AUD">AUD - Australian Dollar</option>
        <option value="CHF">CHF - Swiss Franc</option>
        <option value="CNY">CNY - Chinese Yuan</option>
        <option value="INR">INR - Indian Rupee</option>
        <option value="KES">KES - Kenyan Shilling</option>
        <option value="UGX">UGX - Ugandan Shilling</option>
        <option value="TZS">TZS - Tanzanian Shilling</option>
        <option value="ZAR">ZAR - South African Rand</option>
    </select>
</div>

    <div class="input-group">
        <label>Rate</label>
        <input type="number" id="rate" placeholder="Enter rate">
    </div>

    <button onclick="convertCurrency()">CONVERT</button>

    <div class="result-area">
        <p>Result</p>
        <div id="result-display">Result Here ....</div>
    </div>
</div>

<script>
    function convertCurrency() {
    
        const amount = document.getElementById('amount').value;
        const rate = document.getElementById('rate').value;
        const currency = document.getElementById('currency').value;
        const display = document.getElementById('result-display');

        if (amount === "" || rate === "") {
            display.innerHTML = "Please enter both amount and rate.";
            return;
        }


        const result = parseFloat(amount) / parseFloat(rate);

        
        display.innerHTML = result.toFixed(2) + " " + currency;
    }
</script>

</body>
</html>
